<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .orders-page { padding: 40px 60px; max-width: 900px; margin: 0 auto; }
    .orders-page h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 32px; }
    .order-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 20px; transition: var(--transition); }
    .order-card:hover { box-shadow: var(--shadow-md); }
    .order-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .order-id { font-size: 14px; font-weight: 700; color: var(--text); }
    .order-date { font-size: 13px; color: var(--text-muted); }
    .status-badge { padding: 5px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #cce5ff; color: #004085; }
    .status-shipped { background: #d1ecf1; color: #0c5460; }
    .status-out_for_delivery { background: #e2d9f3; color: #4a235a; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .order-items-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .oi-thumb { width: 56px; height: 56px; object-fit: contain; background: #f5f5f0; border-radius: 8px; padding: 4px; }
    .order-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .order-total { font-size: 16px; font-weight: 700; color: var(--primary); }
    /* Tracking timeline */
    .tracking-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9000; align-items: center; justify-content: center; padding: 20px; }
    .tracking-modal.active { display: flex; }
    .tracking-box { background: var(--bg-card); border-radius: var(--radius-lg); padding: 36px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 2px; background: var(--border); }
    .timeline-item { position: relative; margin-bottom: 24px; }
    .timeline-dot { position: absolute; left: -24px; width: 20px; height: 20px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #fff; }
    .timeline-dot.done { background: var(--primary); }
    .timeline-dot.current { background: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
    .timeline-item .tl-label { font-size: 14px; font-weight: 600; }
    .timeline-item .tl-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .timeline-item .tl-note { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    @media (max-width: 600px) { .orders-page { padding: 20px; } }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>

<div class="orders-page">
  <h1>My Orders</h1>
  <div id="orders-list">
    <div style="text-align:center;padding:60px"><div class="spinner" style="width:36px;height:36px;margin:auto"></div></div>
  </div>
</div>

<!-- Tracking Modal -->
<div class="tracking-modal" id="tracking-modal">
  <div class="tracking-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2 style="font-family:var(--font-display);font-size:22px;font-weight:600">Order Tracking</h2>
      <button onclick="closeTracking()" style="background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted)">✕</button>
    </div>
    <div id="tracking-content"></div>
  </div>
</div>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
const STATUS_ORDER = ['pending','confirmed','shipped','out_for_delivery','delivered'];
const STATUS_LABEL = { pending:'Order Placed', confirmed:'Confirmed', shipped:'Shipped', out_for_delivery:'Out for Delivery', delivered:'Delivered', cancelled:'Cancelled' };
const STATUS_ICON = { pending:'📦', confirmed:'✓', shipped:'🚚', out_for_delivery:'🏃', delivered:'🎉', cancelled:'✕' };

async function loadOrders() {
  if (!isLoggedIn()) { location.href = 'login.html?redirect=orders.html'; return; }
  try {
    const orders = await apiCall('/orders');
    if (!orders.length) {
      document.getElementById('orders-list').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <h3>No orders yet</h3>
          <p>Your orders will appear here once you place one</p>
          <a href="shop.html" class="btn btn-primary">Start Shopping</a>
        </div>`;
      return;
    }
    document.getElementById('orders-list').innerHTML = orders.map(orderCardHTML).join('');
  } catch (e) {
    document.getElementById('orders-list').innerHTML = `<div class="empty-state"><p style="color:var(--accent)">${e.message}</p></div>`;
  }
}

function orderCardHTML(order) {
  return `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="order-id">Order #${order.id}</div>
          <div class="order-date">${new Date(order.createdAt).toLocaleDateString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'numeric'})}</div>
        </div>
        <span class="status-badge status-${order.status}">${STATUS_ICON[order.status]} ${STATUS_LABEL[order.status]}</span>
      </div>
      <div class="order-items-row">
        ${order.items.slice(0,5).map(item=>`<img class="oi-thumb" src="${item.product.img}" alt="${item.product.name}" title="${item.product.name}" onerror="this.style.display='none'">`).join('')}
        ${order.items.length > 5 ? `<div class="oi-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--primary-light);color:var(--primary);font-weight:700;font-size:13px">+${order.items.length-5}</div>` : ''}
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">
        ${order.items.length} item${order.items.length!==1?'s':''} · ${order.paymentMethod === 'cod' ? 'Cash on Delivery' : order.paymentMethod.toUpperCase()}
        ${order.status !== 'cancelled' && order.status !== 'delivered' ? `· Est. delivery: <strong>${new Date(order.estimatedDelivery).toLocaleDateString('en-IN',{month:'short',day:'numeric'})}</strong>` : ''}
      </div>
      <div class="order-footer">
        <div class="order-total">Total: ${fmt(order.total)}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="showTracking('${order.id}')"><i class="fas fa-map-marker-alt"></i> Track</button>
          ${['pending','confirmed'].includes(order.status) ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder('${order.id}')"><i class="fas fa-times"></i> Cancel</button>` : ''}
          ${order.status === 'delivered' ? `<a href="shop.html" class="btn btn-outline btn-sm">Reorder</a>` : ''}
        </div>
      </div>
    </div>
  `;
}

async function showTracking(orderId) {
  try {
    const order = await apiCall(`/orders/${orderId}`);
    const statusIdx = STATUS_ORDER.indexOf(order.status);
    const isCancel = order.status === 'cancelled';
    const content = `
      <div style="margin-bottom:20px">
        <strong>Order #${order.id}</strong>
        <div style="font-size:13px;color:var(--text-muted)">${order.address?.street}, ${order.address?.city}, ${order.address?.state}</div>
      </div>
      ${isCancel ? `<div style="background:#f8d7da;border-radius:8px;padding:16px;text-align:center;color:#721c24;font-weight:600;margin-bottom:20px">❌ This order was cancelled</div>` : `
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:24px">
        ${STATUS_ORDER.map((s,i) => `
          <div style="text-align:center">
            <div style="width:32px;height:32px;border-radius:50%;background:${i<=statusIdx?'var(--primary)':'var(--border)'};color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:12px">${i<=statusIdx?'✓':i+1}</div>
            <div style="font-size:10px;font-weight:600;color:${i<=statusIdx?'var(--primary)':'var(--text-muted)'}">${STATUS_LABEL[s]}</div>
          </div>
          ${i<4?`<div style="height:2px;background:${i<statusIdx?'var(--primary)':'var(--border)'};align-self:center;margin-top:-16px"></div>`:''}
        `).join('')}
      </div>`}
      <div class="timeline">
        ${order.statusHistory.map((h,i) => `
          <div class="timeline-item">
            <div class="timeline-dot ${i===order.statusHistory.length-1?'current':'done'}">${STATUS_ICON[h.status]||'•'}</div>
            <div class="tl-label">${STATUS_LABEL[h.status]||h.status}</div>
            <div class="tl-time">${new Date(h.time).toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
            ${h.note ? `<div class="tl-note">${h.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('tracking-content').innerHTML = content;
    document.getElementById('tracking-modal').classList.add('active');
  } catch (e) { toast(e.message, 'error'); }
}

function closeTracking() { document.getElementById('tracking-modal').classList.remove('active'); }
document.getElementById('tracking-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeTracking(); });

async function cancelOrder(orderId) {
  if (!confirm('Are you sure you want to cancel this order?')) return;
  try {
    await apiCall(`/orders/${orderId}/cancel`, 'PUT');
    toast('Order cancelled successfully');
    loadOrders();
  } catch (e) { toast(e.message, 'error'); }
}

loadOrders();
</script>
</body>
</html>
