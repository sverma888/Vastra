<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
<header class="site-header" id="site-header"></header>
<div style="padding:40px 60px;max-width:1200px;margin:0 auto">
  <h1 style="font-family:var(--font-display);font-size:28px;font-weight:400;margin-bottom:32px">My Wishlist</h1>
  <div id="wishlist-content" style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px">
    <div style="grid-column:1/-1;text-align:center;padding:60px"><div class="spinner" style="width:36px;height:36px;margin:auto"></div></div>
  </div>
</div>
<footer class="site-footer" id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
async function loadWishlist() {
  if (!isLoggedIn()) {
    document.getElementById('wishlist-content').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔒</div><h3>Please login</h3><p>Login to see your wishlist</p><a href="login.html" class="btn btn-primary">Login</a></div>`;
    return;
  }
  const products = await apiCall('/wishlist');
  if (!products.length) {
    document.getElementById('wishlist-content').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🤍</div><h3>Wishlist is empty</h3><p>Save items you love for later</p><a href="shop.html" class="btn btn-primary">Browse Products</a></div>`;
    return;
  }
  document.getElementById('wishlist-content').innerHTML = products.map(p => productCardHTML(p)).join('');
}
loadWishlist();
</script>
</body>
</html>
