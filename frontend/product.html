<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .product-page { padding: 40px 60px; max-width: 1200px; margin: 0 auto; }
    .breadcrumb { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; } .breadcrumb a:hover { color: var(--primary); }
    .product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .product-images .main-img { width: 100%; aspect-ratio: 3/4; object-fit: contain; background: #f5f5f0; border-radius: var(--radius-lg); padding: 20px; }
    .product-info .brand-tag { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); margin-bottom: 8px; }
    .product-info h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; line-height: 1.3; margin-bottom: 12px; }
    .rating-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .rating-row .stars { color: #f0b429; }
    .rating-row .count { font-size: 14px; color: var(--text-muted); }
    .price-block { margin-bottom: 24px; }
    .price-block .main-price { font-size: 30px; font-weight: 700; color: var(--primary); }
    .price-block .rent-info { display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 600; margin-left: 12px; }
    .stock-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
    .stock-badge.in-stock { color: #27ae60; } .stock-badge.low { color: #f39c12; }
    .option-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .size-options, .color-options { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .size-btn {
      padding: 8px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: transparent; font-family: var(--font-body); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition); color: var(--text);
    }
    .size-btn:hover, .size-btn.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
    .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: var(--transition); }
    .color-btn.selected { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
    .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .qty-control { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
    .qty-control button { width: 36px; height: 36px; border: none; background: transparent; font-size: 16px; cursor: pointer; color: var(--text); transition: var(--transition); }
    .qty-control button:hover { background: var(--primary-light); color: var(--primary); }
    .qty-control span { padding: 0 16px; font-weight: 600; min-width: 48px; text-align: center; }
    .action-buttons { display: flex; gap: 12px; margin-bottom: 24px; }
    .product-tabs { margin-top: 40px; }
    .tab-headers { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
    .tab-header { padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
    .tab-header.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .review-item { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .review-item .rv-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .rv-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-light); display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: 700; font-size: 14px; }
    .rv-name { font-weight: 600; font-size: 14px; }
    .rv-date { font-size: 12px; color: var(--text-muted); margin-left: auto; }
    .related-section { padding: 40px 60px; }
    @media (max-width: 900px) { .product-detail { grid-template-columns: 1fr; gap: 24px; } .product-page { padding: 20px; } .related-section { padding: 20px; } }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div id="product-page">
  <div style="text-align:center;padding:100px"><div class="spinner" style="width:40px;height:40px;margin:auto"></div></div>
</div>
<div class="related-section">
  <div class="section-title"><div class="eyebrow">You Might Also Like</div><h2>Related Products</h2></div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px" id="related-grid"></div>
</div>
<footer class="site-footer" id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
let product = null;
let selectedSize = '';
let selectedColor = '';
let qty = 1;

const id = new URLSearchParams(location.search).get('id');

async function loadProduct() {
  if (!id) { location.href='shop.html'; return; }
  try {
    product = await apiCall(`/products/${id}`);
    document.title = `${product.name} — Vastra`;
    renderProduct();
    loadRelated();
  } catch (e) { document.getElementById('product-page').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><h3>Product not found</h3><p>${e.message}</p><a href="shop.html" class="btn btn-primary">Back to Shop</a></div>`; }
}

function renderProduct() {
  const stockClass = product.stock > 10 ? 'in-stock' : product.stock > 0 ? 'low' : 'out';
  const stockText = product.stock > 10 ? '✓ In Stock' : product.stock > 0 ? `⚠ Only ${product.stock} left` : '✕ Out of Stock';
  document.getElementById('product-page').innerHTML = `
    <div class="product-page">
      <div class="breadcrumb">
        <a href="index.html">Home</a> / <a href="shop.html">Shop</a> / <a href="shop.html?category=${product.category}">${product.category.charAt(0).toUpperCase()+product.category.slice(1)}</a> / ${product.name}
      </div>
      <div class="product-detail">
        <div class="product-images">
          <img class="main-img" src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/400x500/f5f5f0/088178?text=No+Image'">
        </div>
        <div class="product-info">
          <div class="brand-tag">${product.brand}</div>
          <h1>${product.name}</h1>
          <div class="rating-row">
            <span class="stars">${stars(product.rating)}</span>
            <span class="count">${product.rating}/5 (${product.reviews} reviews)</span>
          </div>
          <div class="price-block">
            <span class="main-price">${fmt(product.price)}</span>
            <span class="rent-info"><i class="fas fa-calendar-alt"></i> Rent @ ₹${product.rentPrice}/day</span>
          </div>
          <div class="stock-badge ${stockClass}">${stockText}</div>
          <p style="font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:20px">${product.description}</p>
          
          ${product.sizes?.length ? `<div class="option-label">Size</div><div class="size-options">${product.sizes.map(s=>`<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('')}</div>` : ''}
          ${product.colors?.length ? `<div class="option-label">Color</div><div class="color-options">${product.colors.map(c=>`<button class="color-btn" style="background:${colorHex(c)}" onclick="selectColor('${c}',this)" title="${c}"></button>`).join('')}<span id="color-label" style="font-size:13px;color:var(--text-muted);align-self:center"></span></div>` : ''}
          
          <div class="qty-row">
            <div class="option-label" style="margin-bottom:0">Quantity</div>
            <div class="qty-control">
              <button onclick="changeQty(-1)">−</button>
              <span id="qty-display">1</span>
              <button onclick="changeQty(1)">+</button>
            </div>
          </div>
          <div class="action-buttons">
            <button class="btn btn-primary btn-lg" onclick="addToCart('buy')" ${!product.stock?'disabled':''}>
              <i class="fas fa-bag-shopping"></i> Buy — ${fmt(product.price)}
            </button>
            <button class="btn btn-outline btn-lg" onclick="addToCart('rent')">
              <i class="fas fa-calendar-alt"></i> Rent
            </button>
            <button class="header-btn" style="border:1.5px solid var(--border);border-radius:var(--radius-sm);width:48px;height:48px" onclick="toggleWishlistBtn(this)" id="wishlist-toggle">
              <i class="far fa-heart"></i>
            </button>
          </div>
          <div style="display:flex;gap:16px;padding-top:16px;border-top:1px solid var(--border);font-size:13px;color:var(--text-muted)">
            <span><i class="fas fa-truck" style="color:var(--primary)"></i> Free delivery on ₹999+</span>
            <span><i class="fas fa-undo" style="color:var(--primary)"></i> 7-day returns</span>
            <span><i class="fas fa-shield-alt" style="color:var(--primary)"></i> Secure payment</span>
          </div>
        </div>
      </div>
      
      <div class="product-tabs">
        <div class="tab-headers">
          <div class="tab-header active" onclick="switchTab('description',this)">Description</div>
          <div class="tab-header" onclick="switchTab('reviews',this)">Reviews (${product.reviews})</div>
          <div class="tab-header" onclick="switchTab('write-review',this)">Write a Review</div>
        </div>
        <div class="tab-content active" id="tab-description">
          <p style="font-size:15px;line-height:1.8;color:var(--text-muted)">${product.description}</p>
          <br>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:400px">
            ${product.sizes ? `<div><strong style="font-size:13px">Available Sizes:</strong><br><span style="color:var(--text-muted);font-size:13px">${product.sizes.join(', ')}</span></div>` : ''}
            ${product.colors ? `<div><strong style="font-size:13px">Available Colors:</strong><br><span style="color:var(--text-muted);font-size:13px">${product.colors.join(', ')}</span></div>` : ''}
            <div><strong style="font-size:13px">Category:</strong><br><span style="color:var(--text-muted);font-size:13px">${product.category} › ${product.subcategory}</span></div>
            <div><strong style="font-size:13px">Brand:</strong><br><span style="color:var(--text-muted);font-size:13px">${product.brand}</span></div>
          </div>
        </div>
        <div class="tab-content" id="tab-reviews">
          ${product.reviewsList?.length
            ? product.reviewsList.map(r=>`<div class="review-item"><div class="rv-header"><div class="rv-avatar">${r.userName[0]}</div><div><div class="rv-name">${r.userName}</div><div style="color:#f0b429;font-size:12px">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div><span class="rv-date">${new Date(r.createdAt).toLocaleDateString('en-IN')}</span></div><p style="font-size:14px;color:var(--text-muted)">${r.comment}</p></div>`).join('')
            : '<div class="empty-state" style="padding:40px"><div class="empty-icon">💬</div><h3>No reviews yet</h3><p>Be the first to review this product!</p></div>'}
        </div>
        <div class="tab-content" id="tab-write-review">
          ${isLoggedIn() ? `
            <div style="max-width:500px">
              <div class="form-group">
                <label>Your Rating</label>
                <div id="star-rating" style="font-size:28px;cursor:pointer;color:var(--border)">
                  ${[1,2,3,4,5].map(i=>`<span onclick="setRating(${i})" onmouseover="hoverRating(${i})" onmouseout="resetRatingHover()" data-val="${i}">★</span>`).join('')}
                </div>
                <input type="hidden" id="review-rating" value="0">
              </div>
              <div class="form-group"><label>Your Review</label><textarea id="review-comment" rows="4" placeholder="Share your experience with this product..."></textarea></div>
              <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
            </div>
          ` : `<div class="empty-state" style="padding:40px"><div class="empty-icon">🔒</div><h3>Login Required</h3><p>Please login to write a review</p><a href="login.html" class="btn btn-primary">Login</a></div>`}
        </div>
      </div>
    </div>
  `;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab-header').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function selectSize(size, btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedSize = size;
}

function selectColor(color, btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedColor = color;
  document.getElementById('color-label').textContent = color;
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(product.stock || 10, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}

function colorHex(name) {
  const map = { 'Navy Blue':'#1a2f5e','Black':'#1a1a1a','White':'#f5f5f5','Blue':'#2980b9','Red':'#e74c3c','Green':'#27ae60','Grey':'#7f8c8d','Gold':'#d4a843','Silver':'#95a5a6','Pink':'#e91e8c','Purple':'#6c3483','Yellow':'#f1c40f','Beige':'#d4b896','Brown':'#795548','Tan':'#c4925a','Olive':'#808000','Maroon':'#800000','Teal':'#008080','Coral':'#ff6b6b','Orange':'#e67e22' };
  return map[name] || '#088178';
}

async function addToCart(type) {
  if (!isLoggedIn()) { toast('Please login to add to cart', 'info'); setTimeout(() => location.href='login.html', 1000); return; }
  try {
    await apiCall('/cart/add', 'POST', { productId: id, qty, size: selectedSize, color: selectedColor, type });
    toast(type === 'buy' ? 'Added to cart! 🛍️' : 'Added rental to cart! 📅');
    refreshCartCount();
  } catch (e) { toast(e.message, 'error'); }
}

function toggleWishlistBtn(btn) { toggleWishlist(id, btn); }

let currentRating = 0;
function setRating(val) { currentRating = val; document.getElementById('review-rating').value = val; renderStars(val, val); }
function hoverRating(val) { renderStars(currentRating, val); }
function resetRatingHover() { renderStars(currentRating, currentRating); }
function renderStars(selected, hover) {
  const stars = document.querySelectorAll('#star-rating span');
  stars.forEach((s, i) => { s.style.color = i < Math.max(selected, hover) ? '#f0b429' : 'var(--border)'; });
}

async function submitReview() {
  const rating = parseInt(document.getElementById('review-rating').value);
  const comment = document.getElementById('review-comment').value.trim();
  if (!rating) { toast('Please select a rating', 'error'); return; }
  if (!comment) { toast('Please write a comment', 'error'); return; }
  try {
    await apiCall(`/products/${id}/review`, 'POST', { rating, comment });
    toast('Review submitted! Thank you 🙏');
    setTimeout(() => location.reload(), 1000);
  } catch (e) { toast(e.message, 'error'); }
}

async function loadRelated() {
  try {
    const data = await apiCall(`/products?category=${product.category}&limit=4`);
    const related = data.products.filter(p => p.id !== id).slice(0, 4);
    document.getElementById('related-grid').innerHTML = related.map(p => productCardHTML(p)).join('');
  } catch {}
}

loadProduct();
</script>
</body>
</html>
