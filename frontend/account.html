<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .account-page { padding: 40px 60px; max-width: 1000px; margin: 0 auto; }
    .account-layout { display: grid; grid-template-columns: 240px 1fr; gap: 28px; align-items: start; }
    .account-sidebar { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; position: sticky; top: 90px; }
    .sidebar-profile { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 24px; text-align: center; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 28px; font-weight: 700; color: #fff; }
    .sidebar-profile .profile-name { font-size: 16px; font-weight: 600; color: #fff; }
    .sidebar-profile .profile-email { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 14px 20px; text-decoration: none; color: var(--text-muted); font-size: 14px; font-weight: 500; border-left: 3px solid transparent; transition: var(--transition); }
    .sidebar-nav a:hover, .sidebar-nav a.active { color: var(--primary); background: var(--primary-light); border-left-color: var(--primary); }
    .sidebar-nav a i { width: 16px; text-align: center; }
    .account-content { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 28px; }
    .section-heading { font-family: var(--font-display); font-size: 22px; font-weight: 400; margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .tab-section { display: none; } .tab-section.active { display: block; }
    .stat-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; text-align: center; }
    .stat-card .sc-val { font-family: var(--font-display); font-size: 28px; font-weight: 600; color: var(--primary); }
    .stat-card .sc-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .wishlist-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    @media (max-width: 768px) { .account-page { padding: 20px; } .account-layout { grid-template-columns: 1fr; } .account-sidebar { position: static; } .two-col, .stat-cards, .wishlist-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>

<div class="account-page">
  <div class="account-layout">
    <aside class="account-sidebar">
      <div class="sidebar-profile" id="sidebar-profile">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="profile-name" id="sidebar-name">Loading...</div>
        <div class="profile-email" id="sidebar-email"></div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active" onclick="showTab('overview',this)"><i class="fas fa-home"></i> Overview</a>
        <a href="#" onclick="showTab('profile',this)"><i class="fas fa-user"></i> Edit Profile</a>
        <a href="orders.html"><i class="fas fa-box"></i> My Orders</a>
        <a href="#" onclick="showTab('wishlist',this)"><i class="fas fa-heart"></i> Wishlist</a>
        <a href="#" onclick="showTab('address',this)"><i class="fas fa-map-marker-alt"></i> Addresses</a>
        <a href="#" onclick="showTab('security',this)"><i class="fas fa-lock"></i> Security</a>
        <hr class="divider" style="margin:0;border-color:var(--border)">
        <a href="javascript:void(0)" onclick="logout()" style="color:#e74c3c"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>

    <div class="account-content">
      <!-- Overview -->
      <div class="tab-section active" id="tab-overview">
        <div class="section-heading">Dashboard</div>
        <div class="stat-cards" id="stat-cards">
          <div class="stat-card"><div class="sc-val">—</div><div class="sc-label">Total Orders</div></div>
          <div class="stat-card"><div class="sc-val">—</div><div class="sc-label">Wishlist Items</div></div>
          <div class="stat-card"><div class="sc-val">—</div><div class="sc-label">Total Spent</div></div>
        </div>
        <h3 style="font-size:16px;font-weight:600;margin-bottom:16px">Recent Orders</h3>
        <div id="recent-orders-list"></div>
        <a href="orders.html" class="btn btn-outline btn-sm" style="margin-top:12px">View All Orders →</a>
      </div>

      <!-- Profile -->
      <div class="tab-section" id="tab-profile">
        <div class="section-heading">Edit Profile</div>
        <div class="two-col">
          <div class="form-group"><label>Full Name</label><input type="text" id="prof-name" placeholder="Your name"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="prof-phone" placeholder="+91 XXXXX XXXXX"></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" id="prof-email" disabled style="opacity:0.6;cursor:not-allowed"></div>
        <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Save Changes</button>
      </div>

      <!-- Address -->
      <div class="tab-section" id="tab-address">
        <div class="section-heading">Delivery Address</div>
        <div class="form-group"><label>Street Address</label><input type="text" id="addr-street" placeholder="House no, Street, Area"></div>
        <div class="two-col">
          <div class="form-group"><label>City</label><input type="text" id="addr-city" placeholder="City"></div>
          <div class="form-group"><label>State</label><input type="text" id="addr-state" placeholder="State"></div>
        </div>
        <div class="two-col">
          <div class="form-group"><label>Pincode</label><input type="text" id="addr-pin" placeholder="Pincode"></div>
          <div class="form-group"><label>Country</label><input type="text" id="addr-country" value="India"></div>
        </div>
        <button class="btn btn-primary" onclick="saveAddress()"><i class="fas fa-save"></i> Save Address</button>
      </div>

      <!-- Wishlist -->
      <div class="tab-section" id="tab-wishlist">
        <div class="section-heading">My Wishlist</div>
        <div class="wishlist-grid" id="wishlist-grid">
          <div style="grid-column:1/-1;text-align:center;padding:40px"><div class="spinner" style="width:28px;height:28px;margin:auto"></div></div>
        </div>
      </div>

      <!-- Security -->
      <div class="tab-section" id="tab-security">
        <div class="section-heading">Change Password</div>
        <div style="max-width:400px">
          <div class="form-group"><label>Current Password</label><input type="password" id="sec-current" placeholder="Current password"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="sec-new" placeholder="New password (min. 8 chars)"></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="sec-confirm" placeholder="Confirm new password"></div>
          <button class="btn btn-primary" onclick="changePassword()"><i class="fas fa-lock"></i> Update Password</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
let profileData = null;

async function loadProfile() {
  if (!isLoggedIn()) { location.href = 'login.html?redirect=account.html'; return; }
  try {
    profileData = await apiCall('/auth/profile');
    document.getElementById('sidebar-avatar').textContent = profileData.name[0].toUpperCase();
    document.getElementById('sidebar-name').textContent = profileData.name;
    document.getElementById('sidebar-email').textContent = profileData.email;
    document.getElementById('prof-name').value = profileData.name;
    document.getElementById('prof-phone').value = profileData.phone || '';
    document.getElementById('prof-email').value = profileData.email;
    if (profileData.address) {
      document.getElementById('addr-street').value = profileData.address.street || '';
      document.getElementById('addr-city').value = profileData.address.city || '';
      document.getElementById('addr-state').value = profileData.address.state || '';
      document.getElementById('addr-pin').value = profileData.address.pincode || '';
    }
    loadDashboardStats();
  } catch (e) { clearAuth(); location.href = 'login.html'; }
}

async function loadDashboardStats() {
  try {
    const [orders, wishlist] = await Promise.all([apiCall('/orders'), apiCall('/wishlist')]);
    const totalSpent = orders.filter(o => o.status !== 'cancelled').reduce((s,o) => s+o.total, 0);
    document.getElementById('stat-cards').innerHTML = `
      <div class="stat-card"><div class="sc-val">${orders.length}</div><div class="sc-label">Total Orders</div></div>
      <div class="stat-card"><div class="sc-val">${wishlist.length}</div><div class="sc-label">Wishlist Items</div></div>
      <div class="stat-card"><div class="sc-val">${fmt(totalSpent)}</div><div class="sc-label">Total Spent</div></div>
    `;
    const recent = orders.slice(0, 3);
    if (recent.length) {
      document.getElementById('recent-orders-list').innerHTML = recent.map(o => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:14px;font-weight:600">#${o.id}</div>
            <div style="font-size:12px;color:var(--text-muted)">${new Date(o.createdAt).toLocaleDateString('en-IN')} · ${o.items.length} item${o.items.length!==1?'s':''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:700;color:var(--primary)">${fmt(o.total)}</div>
            <span class="status-badge status-${o.status}" style="padding:3px 10px;border-radius:50px;font-size:11px">${o.status}</span>
          </div>
        </div>
      `).join('');
    } else {
      document.getElementById('recent-orders-list').innerHTML = '<p style="color:var(--text-muted);font-size:14px">No orders yet. <a href="shop.html" style="color:var(--primary)">Start shopping!</a></p>';
    }
  } catch {}
}

async function loadWishlist() {
  try {
    const products = await apiCall('/wishlist');
    const grid = document.getElementById('wishlist-grid');
    if (!products.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🤍</div><h3>Wishlist is empty</h3><p>Save items you love</p><a href="shop.html" class="btn btn-primary">Browse Products</a></div>'; return; }
    grid.innerHTML = products.map(p => productCardHTML(p)).join('');
  } catch {}
}

function showTab(name, el) {
  document.querySelectorAll('.tab-section').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'wishlist') loadWishlist();
}

async function saveProfile() {
  const name = document.getElementById('prof-name').value.trim();
  const phone = document.getElementById('prof-phone').value.trim();
  if (!name) { toast('Name is required', 'error'); return; }
  try {
    await apiCall('/auth/profile', 'PUT', { name, phone });
    toast('Profile updated successfully ✓');
    document.getElementById('sidebar-name').textContent = name;
    document.getElementById('sidebar-avatar').textContent = name[0].toUpperCase();
    const user = getUser(); if (user) { user.name = name; localStorage.setItem('vastra_user', JSON.stringify(user)); }
  } catch (e) { toast(e.message, 'error'); }
}

async function saveAddress() {
  const address = {
    street: document.getElementById('addr-street').value.trim(),
    city: document.getElementById('addr-city').value.trim(),
    state: document.getElementById('addr-state').value.trim(),
    pincode: document.getElementById('addr-pin').value.trim(),
    country: document.getElementById('addr-country').value.trim()
  };
  if (!address.street || !address.city) { toast('Street and city are required', 'error'); return; }
  try {
    await apiCall('/auth/profile', 'PUT', { address });
    toast('Address saved ✓');
  } catch (e) { toast(e.message, 'error'); }
}

async function changePassword() {
  const currentPassword = document.getElementById('sec-current').value;
  const newPassword = document.getElementById('sec-new').value;
  const confirm = document.getElementById('sec-confirm').value;
  if (!currentPassword || !newPassword) { toast('All fields required', 'error'); return; }
  if (newPassword.length < 8) { toast('New password must be at least 8 chars', 'error'); return; }
  if (newPassword !== confirm) { toast('Passwords do not match', 'error'); return; }
  try {
    await apiCall('/auth/profile', 'PUT', { currentPassword, newPassword });
    toast('Password updated ✓');
    ['sec-current','sec-new','sec-confirm'].forEach(id => document.getElementById(id).value = '');
  } catch (e) { toast(e.message, 'error'); }
}

loadProfile();
</script>
</body>
</html>
