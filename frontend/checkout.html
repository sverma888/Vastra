<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .checkout-page { padding: 40px 60px; max-width: 1100px; margin: 0 auto; }
    .checkout-page h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; margin-bottom: 32px; }
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }
    .checkout-step { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 28px; margin-bottom: 20px; }
    .step-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
    .step-header h2 { font-size: 17px; font-weight: 600; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .payment-options { display: flex; flex-direction: column; gap: 12px; }
    .payment-option { display: flex; align-items: center; gap: 14px; padding: 16px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: var(--transition); }
    .payment-option:hover, .payment-option.selected { border-color: var(--primary); background: var(--primary-light); }
    .payment-option input[type=radio] { accent-color: var(--primary); width: 16px; height: 16px; }
    .payment-option .po-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .payment-option .po-title { font-size: 14px; font-weight: 600; }
    .payment-option .po-sub { font-size: 12px; color: var(--text-muted); }
    /* Order summary */
    .order-summary { background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 28px; position: sticky; top: 90px; }
    .order-summary h2 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin-bottom: 20px; }
    .order-item { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .order-item img { width: 52px; height: 52px; object-fit: contain; background: #f5f5f0; border-radius: 8px; padding: 4px; flex-shrink: 0; }
    .order-item .oi-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
    .order-item .oi-price { font-size: 13px; color: var(--primary); font-weight: 600; margin-left: auto; white-space: nowrap; }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
    .summary-row.total { border-top: 2px solid var(--border); padding-top: 14px; font-size: 18px; font-weight: 700; }
    .coupon-input { display: flex; gap: 8px; margin-bottom: 16px; }
    .coupon-input input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 13px; outline: none; }
    .coupon-input input:focus { border-color: var(--primary); }
    /* Success overlay */
    .success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; align-items: center; justify-content: center; }
    .success-overlay.show { display: flex; }
    .success-box { background: #fff; border-radius: var(--radius-lg); padding: 50px 40px; max-width: 440px; width: 100%; text-align: center; }
    .success-icon { width: 80px; height: 80px; border-radius: 50%; background: #d4edda; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; animation: pop 0.4s ease; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    @media (max-width: 900px) { .checkout-page { padding: 20px; } .checkout-layout { grid-template-columns: 1fr; } .order-summary { position: static; } .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>

<!-- Progress bar -->
<div style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:14px 60px">
  <div style="display:flex;align-items:center;gap:0;max-width:500px;margin:0 auto">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">✓</div>
      <span style="font-size:11px;color:var(--primary);font-weight:600">Cart</span>
    </div>
    <div style="flex:1;height:2px;background:var(--primary);margin-bottom:20px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">2</div>
      <span style="font-size:11px;color:var(--primary);font-weight:600">Checkout</span>
    </div>
    <div style="flex:1;height:2px;background:var(--border);margin-bottom:20px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">3</div>
      <span style="font-size:11px;color:var(--text-muted)">Confirmation</span>
    </div>
  </div>
</div>

<div class="checkout-page">
  <h1>Checkout</h1>
  <div id="checkout-content">
    <div style="text-align:center;padding:80px"><div class="spinner" style="width:36px;height:36px;margin:auto"></div></div>
  </div>
</div>

<!-- Success Modal -->
<div class="success-overlay" id="success-overlay">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <h2 style="font-family:var(--font-display);font-size:26px;font-weight:400;margin-bottom:8px">Order Placed!</h2>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px">Your order has been confirmed. You'll receive updates via email.</p>
    <div id="order-id-display" style="background:var(--primary-light);border-radius:8px;padding:12px;font-weight:700;color:var(--primary);margin-bottom:24px;font-size:16px"></div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:24px">Estimated delivery: <strong id="delivery-date"></strong></p>
    <a href="orders.html" class="btn btn-primary btn-block" style="text-decoration:none;display:flex;justify-content:center;margin-bottom:10px">Track My Order</a>
    <a href="index.html" class="btn btn-outline btn-block" style="text-decoration:none;display:flex;justify-content:center">Continue Shopping</a>
  </div>
</div>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/api.js"></script>
<script src="js/components.js"></script>
<script>
let cartData = null;
let couponData = null;
let selectedPayment = 'cod';

async function loadCheckout() {
  if (!isLoggedIn()) { location.href = 'login.html?redirect=checkout.html'; return; }
  try {
    const [cart, profile] = await Promise.all([apiCall('/cart'), apiCall('/auth/profile')]);
    cartData = cart;
    if (!cart.items.length) { location.href = 'cart.html'; return; }
    renderCheckout(profile);
  } catch (e) { document.getElementById('checkout-content').innerHTML = `<div class="empty-state"><p style="color:var(--accent)">${e.message}</p></div>`; }
}

function renderCheckout(profile) {
  const subtotal = cartData.subtotal;
  const discount = couponData ? couponData.discountAmount : 0;
  const shipping = (subtotal - discount) >= 999 ? 0 : 99;
  const total = subtotal - discount + shipping;

  document.getElementById('checkout-content').innerHTML = `
    <div class="checkout-layout">
      <div>
        <!-- Address -->
        <div class="checkout-step">
          <div class="step-header"><div class="step-num">1</div><h2>Delivery Address</h2></div>
          <div class="two-col">
            <div class="form-group"><label>Full Name *</label><input type="text" id="addr-name" value="${profile.name}" placeholder="Full Name"></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="addr-phone" value="${profile.phone || ''}" placeholder="+91 XXXXX XXXXX"></div>
          </div>
          <div class="form-group"><label>Street Address *</label><input type="text" id="addr-street" value="${profile.address?.street || ''}" placeholder="House no, Street, Area"></div>
          <div class="two-col">
            <div class="form-group"><label>City *</label><input type="text" id="addr-city" value="${profile.address?.city || ''}" placeholder="City"></div>
            <div class="form-group"><label>State *</label><input type="text" id="addr-state" value="${profile.address?.state || ''}" placeholder="State"></div>
          </div>
          <div class="two-col">
            <div class="form-group"><label>Pincode *</label><input type="text" id="addr-pin" value="${profile.address?.pincode || ''}" placeholder="Pincode"></div>
            <div class="form-group"><label>Landmark</label><input type="text" id="addr-landmark" placeholder="Near..."></div>
          </div>
        </div>

        <!-- Payment -->
        <div class="checkout-step">
          <div class="step-header"><div class="step-num">2</div><h2>Payment Method</h2></div>
          <div class="payment-options">
            <label class="payment-option selected" onclick="selectPayment('cod',this)">
              <input type="radio" name="payment" value="cod" checked>
              <div class="po-icon" style="background:#fff3e0">💵</div>
              <div><div class="po-title">Cash on Delivery</div><div class="po-sub">Pay when your order arrives</div></div>
            </label>
            <label class="payment-option" onclick="selectPayment('upi',this)">
              <input type="radio" name="payment" value="upi">
              <div class="po-icon" style="background:#e8f5e9">📱</div>
              <div><div class="po-title">UPI / GPay / PhonePe</div><div class="po-sub">Pay instantly via UPI</div></div>
            </label>
            <label class="payment-option" onclick="selectPayment('card',this)">
              <input type="radio" name="payment" value="card">
              <div class="po-icon" style="background:#e3f2fd">💳</div>
              <div><div class="po-title">Credit / Debit Card</div><div class="po-sub">Visa, Mastercard, RuPay</div></div>
            </label>
            <label class="payment-option" onclick="selectPayment('netbanking',this)">
              <input type="radio" name="payment" value="netbanking">
              <div class="po-icon" style="background:#f3e5f5">🏦</div>
              <div><div class="po-title">Net Banking</div><div class="po-sub">All major banks supported</div></div>
            </label>
          </div>
          ${selectedPayment === 'card' ? `
          <div class="two-col" style="margin-top:16px">
            <div class="form-group" style="grid-column:1/-1"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456" maxlength="19"></div>
            <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM / YY"></div>
            <div class="form-group"><label>CVV</label><input type="password" placeholder="•••" maxlength="3"></div>
          </div>` : ''}
        </div>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div style="max-height:240px;overflow-y:auto;margin-bottom:16px">
          ${cartData.items.map(item => `
            <div class="order-item">
              <img src="${item.product.img}" alt="" onerror="this.style.display='none'">
              <div>
                <div class="oi-name">${item.product.name}</div>
                <div style="font-size:11px;color:var(--text-muted)">${item.type === 'rent' ? 'Rental' : 'Purchase'} × ${item.qty}</div>
              </div>
              <div class="oi-price">${fmt(item.product[item.type === 'rent' ? 'rentPrice' : 'price'] * item.qty)}</div>
            </div>
          `).join('')}
        </div>
        <div class="coupon-input">
          <input type="text" id="co-coupon" placeholder="Coupon code" ${couponData ? 'disabled' : ''} value="${couponData?.code || ''}">
          <button class="btn btn-outline btn-sm" onclick="${couponData ? 'removeCoupon()' : 'applyCoupon()'}">${couponData ? 'Remove' : 'Apply'}</button>
        </div>
        ${couponData ? `<div style="background:#d4edda;border-radius:6px;padding:8px 12px;font-size:12px;color:#155724;font-weight:600;margin-bottom:12px">🏷️ ${couponData.code}: −${fmt(couponData.discountAmount)}</div>` : ''}
        <div class="summary-row"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
        ${discount ? `<div class="summary-row" style="color:#27ae60"><span>Discount</span><span>-${fmt(discount)}</span></div>` : ''}
        <div class="summary-row"><span>Delivery</span><span style="${shipping===0?'color:var(--primary);font-weight:600':''}">${shipping===0?'FREE':fmt(shipping)}</span></div>
        <div class="summary-row total"><span>Total Payable</span><span style="color:var(--primary)">${fmt(total)}</span></div>
        <button class="btn btn-primary btn-block btn-lg" style="margin-top:20px" onclick="placeOrder()">
          <i class="fas fa-check-circle"></i> Place Order — ${fmt(total)}
        </button>
        <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted)">
          <i class="fas fa-shield-alt" style="color:var(--primary)"></i> 100% Secure & Encrypted Payment
        </div>
      </div>
    </div>
  `;
}

function selectPayment(method, el) {
  selectedPayment = method;
  document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

async function applyCoupon() {
  const code = document.getElementById('co-coupon')?.value.trim();
  if (!code) return toast('Enter a coupon code', 'error');
  try {
    couponData = await apiCall('/coupon/validate', 'POST', { code, subtotal: cartData.subtotal });
    toast(`Coupon "${couponData.code}" applied! 🎉`);
    renderCheckout(await apiCall('/auth/profile'));
  } catch (e) { toast(e.message, 'error'); }
}

function removeCoupon() { couponData = null; renderCheckout({ name: getUser()?.name, phone: '', address: {} }); }

async function placeOrder() {
  const name = document.getElementById('addr-name')?.value.trim();
  const phone = document.getElementById('addr-phone')?.value.trim();
  const street = document.getElementById('addr-street')?.value.trim();
  const city = document.getElementById('addr-city')?.value.trim();
  const state = document.getElementById('addr-state')?.value.trim();
  const pincode = document.getElementById('addr-pin')?.value.trim();
  if (!name || !street || !city || !state || !pincode) { toast('Please fill all required address fields', 'error'); return; }
  try {
    const order = await apiCall('/orders/place', 'POST', {
      address: { name, phone, street, city, state, pincode },
      paymentMethod: selectedPayment,
      coupon: couponData?.code || null
    });
    document.getElementById('order-id-display').textContent = '🛍️ Order ID: ' + order.id;
    document.getElementById('delivery-date').textContent = new Date(order.estimatedDelivery).toLocaleDateString('en-IN', { weekday:'long', month:'long', day:'numeric' });
    document.getElementById('success-overlay').classList.add('show');
    refreshCartCount();
  } catch (e) { toast(e.message, 'error'); }
}

loadCheckout();
</script>
</body>
</html>
