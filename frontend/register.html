<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Vastra</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { background: linear-gradient(135deg, #f5f5f0 0%, #e8f0ed 100%); min-height: 100vh; }
    .auth-page { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .auth-visual { background: linear-gradient(160deg, #2d1b3d 0%, #6b2d6b 60%, #c0608c 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; position: relative; overflow: hidden; }
    .auth-visual::before { content: ''; position: absolute; top: -80px; right: -80px; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,0.05); }
    .auth-logo { font-family: var(--font-display); font-size: 48px; color: #fff; letter-spacing: 4px; margin-bottom: 20px; }
    .auth-logo span { color: #ffd700; }
    .auth-tagline { font-size: 15px; color: rgba(255,255,255,0.75); text-align: center; line-height: 1.8; max-width: 300px; }
    .auth-form-side { display: flex; align-items: center; justify-content: center; padding: 40px; overflow-y: auto; }
    .auth-card { width: 100%; max-width: 440px; }
    .auth-card h1 { font-family: var(--font-display); font-size: 30px; font-weight: 400; margin-bottom: 6px; }
    .auth-card p { color: var(--text-muted); font-size: 15px; margin-bottom: 28px; }
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 44px; }
    .password-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); }
    .strength-bar { height: 4px; border-radius: 2px; margin-top: 6px; background: var(--border); overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted); }
    .auth-switch a { color: var(--primary); font-weight: 600; text-decoration: none; }
    .error-msg { color: #e74c3c; font-size: 13px; margin-top: 6px; display: none; }
    @media (max-width: 768px) { .auth-page { grid-template-columns: 1fr; } .auth-visual { display: none; } .name-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-logo">VASTRA<span>.</span></div>
    <div class="auth-tagline">Join thousands of fashion lovers. Create your free account and start exploring India's best fashion collection.</div>
    <div style="margin-top:40px;display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:260px">
      <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:20px;text-align:center">
        <div style="font-family:var(--font-display);font-size:28px;color:#fff;font-weight:600">36+</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px">Products</div>
      </div>
      <div style="background:rgba(255,255,255,0.1);border-radius:12px;padding:20px;text-align:center">
        <div style="font-family:var(--font-display);font-size:28px;color:#fff;font-weight:600">4.9★</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px">Avg Rating</div>
      </div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">
      <h1>Create Account</h1>
      <p>Join Vastra — it's free and takes 30 seconds</p>
      <div id="reg-error" class="error-msg"></div>
      <div class="name-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="reg-fname" placeholder="Rahul">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="reg-lname" placeholder="Sharma">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="+91 XXXXX XXXXX">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" id="reg-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)">
          <button class="password-toggle" onclick="togglePass('reg-password',this)"><i class="far fa-eye"></i></button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div id="strength-label" style="font-size:11px;margin-top:4px;color:var(--text-muted)"></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="reg-confirm" placeholder="Repeat password">
          <button class="password-toggle" onclick="togglePass('reg-confirm',this)"><i class="far fa-eye"></i></button>
        </div>
      </div>
      <div style="margin-bottom:20px;font-size:13px;color:var(--text-muted)">
        <input type="checkbox" id="terms-check" style="accent-color:var(--primary);margin-right:8px">
        <label for="terms-check">I agree to the <a href="#" style="color:var(--primary)">Terms & Conditions</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a></label>
      </div>
      <button class="btn btn-primary btn-block btn-lg" id="reg-btn" onclick="handleRegister()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
      <div class="auth-switch">Already have an account? <a href="login.html">Sign in →</a></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if (isLoggedIn()) location.href = 'index.html';

function checkStrength(pw) {
  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'0%', c:'transparent', t:'' },
    { w:'25%', c:'#e74c3c', t:'Weak' },
    { w:'50%', c:'#f39c12', t:'Fair' },
    { w:'75%', c:'#3498db', t:'Good' },
    { w:'100%', c:'#27ae60', t:'Strong 💪' }
  ];
  const lv = levels[score];
  fill.style.width = lv.w; fill.style.background = lv.c; label.textContent = lv.t;
}

function togglePass(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
}

async function handleRegister() {
  const fname = document.getElementById('reg-fname').value.trim();
  const lname = document.getElementById('reg-lname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const terms = document.getElementById('terms-check').checked;
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';
  if (!fname || !email || !password) { errEl.textContent = 'Please fill all required fields'; errEl.style.display='block'; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display='block'; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; errEl.style.display='block'; return; }
  if (!terms) { errEl.textContent = 'Please accept the terms & conditions'; errEl.style.display='block'; return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="margin:0 auto"></div>';
  try {
    const res = await apiCall('/auth/register', 'POST', { name: `${fname} ${lname}`.trim(), email, phone, password });
    setAuth(res.token, res.user);
    toast('Account created! Welcome to Vastra 🎉');
    setTimeout(() => location.href = 'index.html', 800);
  } catch (e) {
    errEl.textContent = e.message; errEl.style.display = 'block';
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
  }
}
</script>
</body>
</html>
